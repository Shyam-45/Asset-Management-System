# This is the main configuration file for the application.
# https://www.playframework.com/documentation/latest/ConfigFile

db.default.driver = com.mysql.cj.jdbc.Driver
db.default.url = "jdbc:mysql://localhost:3306/ams"
db.default.username = "YOUR_DB_USERNAME"
db.default.password = "YOUR_DB_PASSWORD"

# Replace with your own secure secret before running the application.
jwt.secret = "CHANGE_ME_BEFORE_RUNNING"

play.http.actionComposition.controllerAnnotationsFirst = true
# It ensures controller-level annotations run before method-level annotations,
# overriding the default execution order.

ebean.default = ["models.*"]

play.evolutions.enabled = true
play.evolutions.autoApply = true
play.evolutions.autoApplyDowns = true

play.http.errorHandler = "exceptions.CustomErrorHandler"

play.filters.enabled += play.filters.headers.SecurityHeadersFilter
play.filters.enabled += play.filters.hosts.AllowedHostsFilter

play.filters.disabled += play.filters.csrf.CSRFFilter

play.filters.enabled += play.filters.cors.CORSFilter

play.filters.cors {

  # Apply CORS to all routes
  pathPrefixes = ["/"]

  # Update this if your frontend runs on a different origin.
  allowedOrigins = ["http://localhost:5173"]

  allowedHttpMethods = [
    "GET",
    "POST",
    "PUT",
    "DELETE"
  ]

  allowedHttpHeaders = [
    "Accept",
    "Origin",
    "Content-Type",
    "Authorization"
  ]
}